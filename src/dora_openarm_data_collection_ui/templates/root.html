<!DOCTYPE html>
<html>
  <head>
    <title>OpenArm data collection UI</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
        background: #0a0a0f;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 48px 24px;
        gap: 32px;
      }

      .top-row {
        display: flex;
        align-items: center;
        gap: 24px;
        background: #1a1a2e;
        padding: 20px 36px;
        border-radius: 16px;
      }

      .episode {
        font-size: 36px;
        font-weight: bold;
        color: #00e5ff;
        text-shadow: 0 0 10px #00e5ff, 0 0 30px #00e5ff;
      }

      .task {
        font-size: 36px;
        font-weight: bold;
        color: #00e5ff;
        text-shadow: 0 0 10px #00e5ff, 0 0 30px #00e5ff;
      }

      div:not(.top-row):not(.status) > div:last-child {
        color: #888;
        font-size: 18px;
        margin-top: 4px;
      }

      .status {
        font-size: 20px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }

      .status.collecting {
        color: white;
        background: #ff3355;
        padding: 10px 24px;
        border-radius: 9999px;
        display: inline-block;
        box-shadow: 0 0 12px rgba(255, 51, 85, 0.5), 0 0 24px rgba(255, 51, 85, 0.25);
      }

      .status.idle {
        color: white;
        background: #00ff88;
        color: #0a0a0f;
        padding: 10px 24px;
        border-radius: 9999px;
        display: inline-block;
        box-shadow: 0 0 12px rgba(0, 255, 136, 0.5), 0 0 24px rgba(0, 255, 136, 0.25);
      }

      .big-button {
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
        font-size: 28px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 20px 48px;
        margin: 10px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .start {
        background: rgba(0, 255, 136, 0.1);
        color: #00ff88;
        border: 2px solid rgba(0, 255, 136, 0.4);
        box-shadow: 0 0 12px rgba(0, 255, 136, 0.15);
      }
      .start:hover {
        background: rgba(0, 255, 136, 0.2);
        box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
      }

      .finish {
        background: rgba(255, 51, 85, 0.1);
        color: #ff3355;
        border: 2px solid rgba(255, 51, 85, 0.4);
        box-shadow: 0 0 12px rgba(255, 51, 85, 0.15);
      }
      .finish:hover {
        background: rgba(255, 51, 85, 0.2);
        box-shadow: 0 0 20px rgba(255, 51, 85, 0.3);
      }

      .quit {
        background: rgba(136, 136, 136, 0.1);
        color: #888;
        border: 2px solid rgba(136, 136, 136, 0.3);
        font-size: 18px;
        padding: 12px 28px;
        margin-top: 24px;
      }
      .quit:hover {
        background: rgba(136, 136, 136, 0.2);
        color: #aaa;
        box-shadow: 0 0 12px rgba(136, 136, 136, 0.2);
      }

      form { display: inline; }
    </style>
  </head>
  <body>
    <div class="top-row">
      <div class="episode">
        Episode: {{ state.episode_number }}
      </div>

      {% if state.collecting -%}
        <div class="status collecting">Collecting</div>
      {% else -%}
        <div class="status idle">Idle</div>
      {% endif -%}
    </div>

    <div class="task">Task: {{ state.task_index }}</div>
    <div>({{ state.task_title }})</div>

    {% if state.collecting -%}
      <form id="finish-form" action="{{ url_for("_success") }}" method="post">
        <input class="big-button finish" type="submit" value="Success!">
      </form>

      <form id="fail-form" action="{{ url_for("_fail") }}" method="post">
        <input class="big-button finish" type="submit" value="Fail!">
      </form>

      <form id="cancel-form" action="{{ url_for("_cancel") }}" method="post">
        <input class="big-button finish" type="submit" value="Cancel!">
      </form>
    {% else -%}
      <form id="start-form" action="{{ url_for("_start") }}" method="post">
        <input class="big-button start" type="submit" value="Start!">
      </form>
      <form id="skip-form" action="{{ url_for("_skip") }}" method="post">
        <input class="big-button start" type="submit" value="Skip task">
      </form>
    {% endif -%}

    {% if state.running -%}
      <form id="quit-form" action="{{ url_for("_quit") }}" method="post">
        <input class="big-button quit" type="submit" value="Quit">
      </form>
    {% endif -%}

    <script>
      const LONG_PRESS_MS = 1000;
      let skipTimer = null;
      let cancelTimer = null;
      const focusableElements = [...document.querySelectorAll('input')];

      document.addEventListener("keydown", function(event) {
        if (event.repeat) return;

        if (event.key.toLowerCase() === "c") {
          if (!skipTimer) {
            skipTimer = setTimeout(() => {
              skipTimer = null;
              const skipForm = document.getElementById("skip-form");
              if (skipForm) skipForm.submit();
            }, LONG_PRESS_MS);
          }
        }

        if (event.key.toLowerCase() === "b") {
          const quitForm = document.getElementById("quit-form");
          if (quitForm) quitForm.submit();
        }

        if (event.key.toLowerCase() === "a") {
          if (!cancelTimer) {
            cancelTimer = setTimeout(() => {
              cancelTimer = null;
              const cancelForm = document.getElementById("cancel-form");
              if (cancelForm) cancelForm.submit();
            }, LONG_PRESS_MS);
          }
        }
        if (event.key.toLowerCase() === "h") {
          const current = focusableElements.indexOf(document.activeElement);
          const next = (current + 1) % focusableElements.length;
          focusableElements[next].focus();
        }
        if (event.key.toLowerCase() === "y") {
          const current = focusableElements.indexOf(document.activeElement);
          const prev = (current - 1 + focusableElements.length) % focusableElements.length;
          focusableElements[prev].focus();
        }
        if (event.key.toLowerCase() === "n") {
          const active = document.activeElement;
          const form = active.closest('form');
          if (form) {
            form.submit();
          }
        }
      });

      document.addEventListener("keyup", (event) => {
        if (event.key.toLowerCase() === "c") {
          if (skipTimer) {
            clearTimeout(skipTimer);
            skipTimer = null;
            const startForm = document.getElementById("start-form");
            if (startForm) startForm.submit();
            const finishForm = document.getElementById("finish-form");
            if (finishForm) finishForm.submit();
          }
        }

        if (event.key.toLowerCase() === "a") {
          if (cancelTimer) {
            clearTimeout(cancelTimer);
            cancelTimer = null;
            const failForm = document.getElementById("fail-form");
            if (failForm) failForm.submit();
          }
        }
      });
    </script>
  </body>
</html>
